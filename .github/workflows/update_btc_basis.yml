name: Update BTC CME Basis Data

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 UTC 02:00 (한국시간 11:00) — CME 정산 후
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch BTC basis data
        run: python scripts/fetch_btc_basis.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/btc_basis.json
          git diff --staged --quiet || git commit -m "chore: BTC basis data update $(date +'%Y-%m-%d')"
          git push
