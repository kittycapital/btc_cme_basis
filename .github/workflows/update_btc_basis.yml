name: Update BTC CME Basis Data

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 평일만 UTC 02:00 (KST 11:00)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Fetch BTC basis data
        env:
          NASDAQ_API_KEY: ${{ secrets.NASDAQ }}
        run: python scripts/fetch_btc_basis.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/btc_basis.json
          git diff --staged --quiet || git commit -m "chore: BTC basis update $(date +'%Y-%m-%d')"
          git push
